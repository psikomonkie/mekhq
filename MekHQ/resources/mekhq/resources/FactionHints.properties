# suppress inspection "UnusedProperty" for the whole file
FactionHints.customLegacyXml.title=Custom Faction Hints File Detected
FactionHints.customLegacyXml.message=<html><h2>Your factionhints.xml is no longer being loaded</h2>\
  <p>The file <b>{0}</b> differs from the faction diplomacy data shipped with this release.<br>\
  MekHQ now reads its wars, alliances, and other faction relationships from the<br>\
  <b>{1}</b> folder, and the old XML file is ignored when that folder is present.</p>\
  <p><b>Any custom wars or alliances in your XML file are currently NOT in effect.</b></p>\
  <p>To keep your customizations, recreate them as a YAML file in the <b>{1}</b> folder —<br>\
  for example <b>myCustomWars.yml</b>. The format is documented in<br>\
  <b>docs/Faction Diplomacy Readme.md</b>, and your file will be loaded alongside the shipped<br>\
  data without touching it.</p>\
  <p>If you never customized factionhints.xml, you can simply delete it to dismiss this notice.</p></html>
